<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 240px; padding: 16px; font-family: -apple-system, "Segoe UI", sans-serif; margin: 0; }
    .brand { font-size: 18px; font-weight: 800; color: #222; margin-bottom: 2px; letter-spacing: -0.3px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; line-height: 1.4; }
    button { 
      width: 100%; padding: 11px; background: linear-gradient(135deg, #007aff, #5856d6); color: white; 
      border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px;
      transition: transform .1s, box-shadow .2s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,122,255,.3); }
    button:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="brand">Pinpoint</div>
  <div class="subtitle">你负责说，我负责告诉 AI</div>
  <button id="launchBtn">👆 开始指指点点</button>
  <script src="popup.js"></script>
</body>
</html>
